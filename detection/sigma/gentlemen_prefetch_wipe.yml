title: The Gentlemen Ransomware — Prefetch Wipe
id: 6a5a0db4-d1fd-4c44-9f7e-58c0a6b9a5ea
status: experimental
description: |
  The Gentlemen ransomware clears C:\Windows\Prefetch\*.* before encryption
  to hinder forensic recovery of its own execution artifacts. Detects the
  explicit command form observed in samples (embedded in the binary as a
  literal string caught by our YARA rules).
author: Bedrock Safeguard Inc.
date: 2026-04-21
references:
  - https://github.com/Bedrock-Safeguard/gentlemen-decryptor
tags:
  - attack.defense_evasion
  - attack.t1070.004
  - attack.t1070.006
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
  selection_cmd:
    CommandLine|contains|all:
      - 'C:\Windows\Prefetch'
      - '*.*'
    CommandLine|contains:
      - 'del '
      - 'Remove-Item'
      - 'erase '
  condition: selection_img and selection_cmd
falsepositives:
  - Forensic tooling or sanctioned incident-response activity
  - Some custom IT scripts
level: high
