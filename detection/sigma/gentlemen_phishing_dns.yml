      - 'tottimeths.org.uk'
      - 'tigersafari.us'
      - 'cdbattery.org'
      - 'tomisho.info'
      - 'caterham.pro'
      - 'norc-us.org'
      - 'butternutpeeler.com'
      - 'a-bit-z.de'
      - 'lewesjoinery.co.uk'
      - 'plumbline.org.uk'
      - 'lugwash.org'
  condition: selection
falsepositives:
  - Some apex zones appear to be squatted/typo-similar to legitimate small-business sites; legitimate visits from non-targeted users would be rare but possible. Prioritise alerts from corporate endpoints that received phishing mail.
level: high
